<!DOCTYPE html>

<html>
<head>
<title>Mind Map Code Words</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

#mindmap{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.word{
background:white;
padding:10px;
margin:5px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<h1>Class Mind Map</h1>

<div id="teacherPanel">

<h2>Teacher Setup</h2>

Topic: <input id="topic">

<br><br>

Codeword 1: <input id="c1">

<br>

Codeword 2: <input id="c2">

<br>

Codeword 3: <input id="c3">

<br><br>

<button onclick="createSession()">Create Session</button>

<h3 id="sessionCode"></h3>

</div>

<hr>

<div id="studentPanel">

<h2>Join Session</h2>

Name: <input id="name">

<br><br>

Session Code: <input id="session">

<br><br>

<button onclick="join()">Join</button>

</div>

<hr>

<div id="game">

<h2 id="topicDisplay"></h2>

<input id="guess" placeholder="Enter word">

<button onclick="submitGuess()">Submit Guess</button>

<p id="guessesLeft"></p>

<div id="mindmap"></div>

</div>

<script>

// PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().signInAnonymously();

let sessionID="";
let guesses=3;

function createSession(){

sessionID=Math.random().toString(36).substring(2,6).toUpperCase();

let topic=document.getElementById("topic").value;

let codewords=[
document.getElementById("c1").value.toLowerCase(),
document.getElementById("c2").value.toLowerCase(),
document.getElementById("c3").value.toLowerCase()
];

db.collection("sessions").doc(sessionID).set({
topic:topic,
codewords:codewords
});

document.getElementById("sessionCode").innerText="Session Code: "+sessionID;

}

function join(){

sessionID=document.getElementById("session").value.toUpperCase();

db.collection("sessions").doc(sessionID).get().then(doc=>{

document.getElementById("topicDisplay").innerText=doc.data().topic;

listen();

});

}

function submitGuess(){

if(guesses<=0)return;

let word=document.getElementById("guess").value.toLowerCase();

let ref=db.collection("sessions").doc(sessionID).collection("words").doc(word);

db.runTransaction(t=>{

return t.get(ref).then(doc=>{

if(!doc.exists){

t.set(ref,{count:1});

}else{

t.update(ref,{count:doc.data().count+1});

}

});

});

guesses--;

document.getElementById("guessesLeft").innerText="Guesses left: "+guesses;

}

function listen(){

db.collection("sessions").doc(sessionID).collection("words")
.onSnapshot(snapshot=>{

let map=document.getElementById("mindmap");

map.innerHTML="";

snapshot.forEach(doc=>{

let div=document.createElement("div");

div.className="word";

div.innerText=doc.id+" ("+doc.data().count+")";

map.appendChild(div);

});

});

}

</script>

</body>
</html>
