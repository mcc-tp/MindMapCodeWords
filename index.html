<!DOCTYPE html>

<html>
<head>
<title>Mind Map Code Words</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
margin:0;
}

h1{
background:#2c3e50;
color:white;
padding:15px;
margin:0;
}

#teacher,#student,#game{
margin-top:30px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
cursor:pointer;
}

#mindmap{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.word{
background:white;
padding:10px;
margin:6px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.winner{
background:#ffe066;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Class Mind Map</h1>

<div id="teacher">

<h2>Teacher Setup</h2>

Topic <br> <input id="topic">

<br><br>

Codeword 1 <br> <input id="c1">

<br>

Codeword 2 <br> <input id="c2">

<br>

Codeword 3 <br> <input id="c3">

<br><br>

<button onclick="createSession()">Create Session</button>

<h3 id="sessionCode"></h3>

</div>

<hr>

<div id="student">

<h2>Join Session</h2>

Name <br> <input id="name">

<br><br>

Session Code <br> <input id="session">

<br><br>

<button onclick="joinSession()">Join</button>

</div>

<hr>

<div id="game">

<h2 id="topicDisplay"></h2>

<input id="guess" placeholder="Enter a word">

<button onclick="submitGuess()">Submit Guess</button>

<p id="guessesLeft"></p>

<div id="mindmap"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBg3E0d2zoAEHJhhpWbAQ3KSw9VlxkRias",
  authDomain: "mindmapcodewords.firebaseapp.com",
  projectId: "mindmapcodewords",
  storageBucket: "mindmapcodewords.firebasestorage.app",
  messagingSenderId: "246370170293",
  appId: "1:246370170293:web:23965a359b816f60bed5fc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

signInAnonymously(auth);

let sessionID="";
let guesses=3;

function randomCode(){

return Math.random().toString(36).substring(2,6).toUpperCase();

}

window.createSession = async function(){

sessionID=randomCode();

let topic=document.getElementById("topic").value;

let codewords=[
document.getElementById("c1").value.toLowerCase(),
document.getElementById("c2").value.toLowerCase(),
document.getElementById("c3").value.toLowerCase()
];

await setDoc(doc(db,"sessions",sessionID),{

topic:topic,
codewords:codewords

});

document.getElementById("sessionCode").innerText="Session Code: "+sessionID;

}

window.joinSession = async function(){

sessionID=document.getElementById("session").value.toUpperCase();

let sessionRef=doc(db,"sessions",sessionID);

let snap=await getDoc(sessionRef);

if(!snap.exists()){

alert("Session not found");

return;

}

document.getElementById("topicDisplay").innerText=snap.data().topic;

listenForWords();

}

window.submitGuess = async function(){

if(guesses<=0)return;

let word=document.getElementById("guess").value.toLowerCase();

let wordRef=doc(db,"sessions",sessionID,"words",word);

await runTransaction(db,async(transaction)=>{

let docSnap=await transaction.get(wordRef);

if(!docSnap.exists()){

transaction.set(wordRef,{count:1});

}else{

transaction.update(wordRef,{count:docSnap.data().count+1});

}

});

guesses--;

document.getElementById("guessesLeft").innerText="Guesses left: "+guesses;

}

function listenForWords(){

const wordsCollection=collection(db,"sessions",sessionID,"words");

onSnapshot(wordsCollection,(snapshot)=>{

let map=document.getElementById("mindmap");

map.innerHTML="";

snapshot.forEach((docu)=>{

let div=document.createElement("div");

div.className="word";

div.innerText=docu.id+" ("+docu.data().count+")";

map.appendChild(div);

});

});

}

</script>

</body>
</html>
