<!DOCTYPE html>

<html>
<head>

<title>Mind Map Code Words</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin:0;
}

h1{
background:#2c3e50;
color:white;
padding:15px;
margin:0;
}

.panel{
margin-top:30px;
}

#network{
width:100%;
height:500px;
border:1px solid #ddd;
background:white;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Class Mind Map</h1>

<div id="teacherPanel" class="panel">

<h2>Teacher Setup</h2>

Topic <br> <input id="topic">

<br><br>

Codeword 1 <br> <input id="c1">

<br>

Codeword 2 <br> <input id="c2">

<br>

Codeword 3 <br> <input id="c3">

<br><br>

<button onclick="createSession()">Create Session</button>

<h3 id="sessionCode"></h3>

</div>

<hr>

<div class="panel">

<h2>Join Session</h2>

Name <br> <input id="name">

<br><br>

Session Code <br> <input id="session">

<br><br>

<button onclick="joinSession()">Join</button>

</div>

<hr>

<h2 id="topicDisplay"></h2>

<input id="guess" placeholder="Enter word">

<button onclick="submitGuess()">Submit Guess</button>

<p id="guessesLeft"></p>

<div id="network"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBg3E0d2zoAEHJhhpWbAQ3KSw9VlxkRias",
authDomain: "mindmapcodewords.firebaseapp.com",
projectId: "mindmapcodewords",
storageBucket: "mindmapcodewords.firebasestorage.app",
messagingSenderId: "246370170293",
appId: "1:246370170293:web:23965a359b816f60bed5fc"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

signInAnonymously(auth);

let sessionID="";
let guesses=3;

const nodes=new vis.DataSet([]);
const edges=new vis.DataSet([]);

const container=document.getElementById("network");

const network=new vis.Network(container,{nodes,edges},{});

let topicNode=null;

function randomCode(){

return Math.random().toString(36).substring(2,6).toUpperCase();

}

window.createSession=async function(){

sessionID=randomCode();

let topic=document.getElementById("topic").value;

let codewords=[
document.getElementById("c1").value.toLowerCase(),
document.getElementById("c2").value.toLowerCase(),
document.getElementById("c3").value.toLowerCase()
];

await setDoc(doc(db,"sessions",sessionID),{
topic:topic,
codewords:codewords
});

document.getElementById("sessionCode").innerText="Session Code: "+sessionID;

};

window.joinSession=async function(){

sessionID=document.getElementById("session").value.toUpperCase();

let snap=await getDoc(doc(db,"sessions",sessionID));

if(!snap.exists()){

alert("Session not found");
return;

}

let topic=snap.data().topic;

document.getElementById("topicDisplay").innerText=topic;

nodes.clear();
edges.clear();

topicNode="topic";

nodes.add({id:topicNode,label:topic,shape:"ellipse",color:"#ffcc00"});

listen();

};

window.submitGuess=async function(){

if(guesses<=0)return;

let word=document.getElementById("guess").value.toLowerCase();

let ref=doc(db,"sessions",sessionID,"words",word);

await runTransaction(db,async(transaction)=>{

let snap=await transaction.get(ref);

if(!snap.exists()){

transaction.set(ref,{count:1});

}else{

transaction.update(ref,{count:snap.data().count+1});

}

});

guesses--;

document.getElementById("guessesLeft").innerText="Guesses left: "+guesses;

};

function listen(){

onSnapshot(collection(db,"sessions",sessionID,"words"),(snapshot)=>{

snapshot.forEach(docu=>{

let word=docu.id;
let count=docu.data().count;

if(!nodes.get(word)){

nodes.add({
id:word,
label:word+" ("+count+")"
});

edges.add({
from:topicNode,
to:word
});

}else{

nodes.update({
id:word,
label:word+" ("+count+")"
});

}

});

});

}

const urlParams=new URLSearchParams(window.location.search);

if(!urlParams.has("teacher")){

document.getElementById("teacherPanel").style.display="none";

}

</script>

</body>
